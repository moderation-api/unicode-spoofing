# Checks weekly for new Unicode security data (confusables.txt), regenerates
# the vendored table, and opens a PR when it changed.
name: Update Unicode data

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Regenerate confusables table from latest Unicode security data
        run: node scripts/generate-confusables.mjs

      - name: Read generated Unicode version
        id: version
        run: |
          echo "unicode=$(node -e "process.stdout.write(require('fs').readFileSync('src/data/confusables.generated.ts','utf8').match(/UNICODE_VERSION = '([^']+)'/)[1])")" >> "$GITHUB_OUTPUT"

      - name: Run tests against the new data
        run: |
          npm ci
          npm test

      - name: Open PR if the data changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'data: update UTS #39 confusables to Unicode ${{ steps.version.outputs.unicode }}'
          title: 'Update UTS #39 confusables to Unicode ${{ steps.version.outputs.unicode }}'
          body: >
            Automated regeneration of the vendored confusables table from
            https://www.unicode.org/Public/security/latest/confusables.txt.
            Tests ran against the new data in this workflow; review the diff
            and merge to release.
          branch: bot/update-unicode-data
          delete-branch: true
