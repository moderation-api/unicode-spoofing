name: Feature request
description: Suggest a new signal, option, or capability
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What obfuscation or use case is not handled today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like the API to do? Include example input/output if you can.
    validations:
      required: false
